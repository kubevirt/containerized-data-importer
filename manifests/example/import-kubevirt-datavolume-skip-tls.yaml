# This example assumes you are using a default storage class
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: my-data-volume
spec:
  source:
      http:
         url: "https://172.16.15.6/iso/cirros-0.4.0-x86_64-disk.img"
         insecureSkipVerify: true
  storage:
    resources:
      requests:
        storage: 500Mi
